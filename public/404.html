<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect — préserve le path pour Vue Router
    const path = window.location.pathname.replace('/darts-trainer', '') || '/'
    window.location.replace(
      window.location.origin + '/darts-trainer/?redirect=' + encodeURIComponent(path + window.location.search) + window.location.hash
    )
  </script>
</head>
<body></body>
</html>
